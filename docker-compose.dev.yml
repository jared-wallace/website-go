services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: website
      POSTGRES_PASSWORD: website
      POSTGRES_DB: website_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U website"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
