services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - /var/www/html/.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # EBS bind-mount. Host dir MUST exist with correct ownership:
      #   sudo mkdir -p /var/www/html/pgdata
      #   sudo chown 999:999 /var/www/html/pgdata
      - /var/www/html/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - /var/www/html/.env
    volumes:
      # Image uploads — EBS-backed, survives container restarts
      - /var/www/html/images:/var/www/html/images
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
