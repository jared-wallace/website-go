version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
      - ./static:/root/static  # For development - mount static files
      - ./templates:/root/templates  # For development - mount templates
    environment:
      - DB_PATH=/data/blog.db
      - PORT=8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
