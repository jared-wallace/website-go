<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <meta name="description" content="Jared Wallace - Software Developer, Blog, and Projects">
    
    <!-- Preload critical resources -->
    <link rel="preload" href="/static/css/main.css" as="style">
    <link rel="preload" href="/static/images/beach-bg.webp" as="image">
    
    <!-- Critical CSS inlined for performance -->
    <style>
        /* Critical CSS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f8f8f8;
        }
        
        .hero-section {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('/static/images/beach-bg.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }
        
        .hero-content h1 {
            font-size: 3.5rem;
            font-weight: 300;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }
        
        .hero-content p {
            font-size: 1.2rem;
            font-weight: 300;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .nav-container {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid #e0e0e0;
        }
        
        nav {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            color: #333;
            text-decoration: none;
        }
        
        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }
        
        .nav-links a {
            color: #333;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        
        .nav-links a:hover {
            color: #007acc;
        }
        
        /* News ticker */
        .news-ticker {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #333;
            color: white;
            padding: 0.5rem 0;
            z-index: 999;
            overflow: hidden;
        }
        
        .ticker-content {
            display: inline-block;
            white-space: nowrap;
            animation: scroll 60s linear infinite;
        }
        
        @keyframes scroll {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
    </style>
    
    <!-- Load non-critical CSS -->
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <div class="nav-container">
        <nav>
            <a href="/" class="logo">Jared Wallace</a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/blog">Blog</a></li>
                <li><a href="/projects">Projects</a></li>
                <li><a href="/about">About</a></li>
            </ul>
        </nav>
    </div>

    <main>
        {{block "content" .}}{{end}}
    </main>

    <!-- News ticker -->
    <div class="news-ticker">
        <div class="ticker-content" id="news-ticker">
            Loading news...
        </div>
    </div>

    <!-- Minimal JavaScript for news ticker -->
    <script>
        async function loadNews() {
            try {
                // You would implement BBC RSS feed fetching here
                // For now, using placeholder
                const news = [
                    { title: "Loading BBC World News..." },
                ];
                
                const ticker = document.getElementById('news-ticker');
                ticker.textContent = news.map(item => item.title).join(' • ') + ' • ';
            } catch (error) {
                console.error('Failed to load news:', error);
            }
        }

        // Load news on page load
        document.addEventListener('DOMContentLoaded', loadNews);

        // Smooth scrolling for navigation links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });
    </script>
</body>
</html>
