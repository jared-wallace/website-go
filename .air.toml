root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./cmd/server"
  bin = "./tmp/main"
  include_ext = ["go", "html", "css"]
  exclude_dir = ["assets", "tmp", "vendor", ".git", ".planning"]
  exclude_regex = ["_test.go"]
  delay = 1000
  stop_on_error = true
  log = "build-errors.log"

[log]
  time = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"
