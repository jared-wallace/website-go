{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{block "title" .}}The Wild Meridian{{end}}</title>
  <script>(function(){var t=localStorage.getItem('theme');if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme: dark)').matches)){document.documentElement.setAttribute('data-theme','dark');}})()</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lora:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/main.css">
  <link rel="alternate" type="application/rss+xml" title="The Wild Meridian" href="/rss">
  {{block "meta" .}}
  <meta property="og:title" content="The Wild Meridian">
  <meta property="og:description" content="dispatches from the deep end">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://jared-wallace.com/static/og-fallback.png">
  <meta property="og:url" content="https://jared-wallace.com">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="The Wild Meridian">
  <meta name="twitter:description" content="dispatches from the deep end">
  <meta name="twitter:image" content="https://jared-wallace.com/static/og-fallback.png">
  {{end}}
</head>
<body>
  <nav class="site-nav">
    <a href="/" class="site-name">The Wild Meridian</a>
    <span class="site-tagline">dispatches from the deep end</span>
    <button class="dark-toggle" id="dark-toggle" aria-label="Switch to dark mode">
      <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
      <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>
  </nav>

  {{block "content" .}}{{end}}

  <footer class="site-footer">
    <hr class="rope-divider">
    <p>&copy; {{.Year}} Jared Wallace</p>
  </footer>

  <script src="/static/main.js" defer></script>
</body>
</html>
{{end}}
