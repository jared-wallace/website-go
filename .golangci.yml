linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosimple
    - ineffassign
    - unused
    - sqlclosecheck
    - gosec
    - gofmt
    - goimports

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: false
  govet:
    enable-all: true
  gosec:
    severity: medium
    confidence: medium

issues:
  exclude-rules:
    - path: "_test.go"
      linters:
        - errcheck
        - gosec

run:
  timeout: 5m
  tests: true
